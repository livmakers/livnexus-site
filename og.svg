<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B2440"/>
      <stop offset="0.55" stop-color="#0E2A4E"/>
      <stop offset="1" stop-color="#0A1F3A"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.85" cy="0.12" r="0.55">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#sun)"/>
  <!-- network motif -->
  <g stroke="#38BDF8" stroke-opacity="0.16" stroke-width="1.4" fill="none">
    <path d="M820 90 L980 180 L900 320 L1080 360 L960 470"/>
    <path d="M980 180 L1100 120 M900 320 L760 240 M1080 360 L1140 250"/>
  </g>
  <g fill="#7DD3FC" fill-opacity="0.55">
    <circle cx="820" cy="90" r="5"/><circle cx="980" cy="180" r="6"/><circle cx="900" cy="320" r="5"/>
    <circle cx="1080" cy="360" r="6"/><circle cx="960" cy="470" r="5"/><circle cx="1100" cy="120" r="4"/>
    <circle cx="760" cy="240" r="4"/><circle cx="1140" cy="250" r="4"/>
  </g>
  <!-- accent bar -->
  <rect x="90" y="96" width="56" height="6" rx="3" fill="url(#acc)"/>
  <!-- text -->
  <text x="160" y="106" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="30" font-weight="700" fill="#7DD3FC" letter-spacing="6">LIV nexus</text>
  <text x="90" y="270" font-family="'Noto Sans JP', sans-serif" font-weight="900" font-size="92" fill="#FFFFFF">つなぐ力で、</text>
  <text x="90" y="380" font-family="'Noto Sans JP', sans-serif" font-weight="900" font-size="92" fill="url(#acc)">商流を進化させる。</text>
  <text x="92" y="470" font-family="'Noto Sans JP', sans-serif" font-size="32" fill="#C6D2E3">リブネクサス株式会社　｜　食品卸・水産卸・商社機能</text>
  <text x="92" y="540" font-family="Inter, sans-serif" font-size="26" fill="#7DD3FC" letter-spacing="2">Connecting Markets. Creating New Value.</text>
</svg>
